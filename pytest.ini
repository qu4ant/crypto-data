[pytest]
# Pytest configuration for crypto-data universe tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    # Coverage options (uncomment to enable)
    # --cov=src/crypto_data
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-fail-under=90

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    api: marks tests that interact with external APIs
    asyncio: marks tests as async tests (require pytest-asyncio)
    schema: marks tests that validate data schemas (Pandera)

# Pandera configuration
pandera_validation_depth = SCHEMA_AND_DATA
pandera_cache_dataframe = true

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
