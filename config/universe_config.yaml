# ============================================================================
# Universe Filtering Configuration - CoinMarketCap Tags
# ============================================================================
#
# This config filters coins during universe ingestion from CoinMarketCap API.
#
# IMPORTANT: CoinMarketCap uses lowercase, hyphenated tags
# Examples: 'stablecoin', 'asset-backed-stablecoin', 'sha-256', 'memes'
#
# Tags listed in 'exclude_categories' will be EXCLUDED from the universe.
# Coins matching ANY of these tags will be filtered out during ingestion.
#
# ============================================================================

exclude_categories:
  # ===== ACTIVE EXCLUSIONS =====

  # Stablecoins - USD-pegged tokens
  - stablecoin                    # General stablecoin tag (USDT, USDC, BUSD, TUSD)
  - wrapped-tokens               # Wrapped tokens (WUSDT, WUSDC, WBTC)
  - real-world-assets
  - privacy
  - tokenized-gold

# ============================================================================
# Explicit Symbol Blacklist
# ============================================================================
#
# Symbols listed here will be EXCLUDED from universe ingestion regardless
# of their rank or category tags. Use this for problematic coins with:
# - Ticker reuse after collapse/rebrand
# - Data quality issues
# - Incomplete trading history
#
# ============================================================================

exclude_symbols:
  # ===== ACTIVE EXCLUSIONS =====

  # Collapsed Projects - Ticker reused or data incomplete
  - LUNA     # Terra collapse (May 2022) - ticker reused for Terra 2.0, futures stopped
  - FTT      # FTX Token collapse (Nov 2022) - exchange bankruptcy, incomplete data
  - UST      # TerraUSD algorithmic stablecoin (failed May 2022)

  # ===== OPTIONAL EXCLUSIONS (Uncomment to activate) =====

  # Other problematic symbols can be added here
  # - SYMBOL   # Reason for exclusion
