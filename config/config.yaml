# Crypto Data Database Population Configuration

# Database path
# IMPORTANT: Use the naming pattern crypto_{interval}.db (e.g., crypto_5m.db, crypto_1h.db)
# Each interval MUST have its own database file to prevent mixing different timeframes.
# The system validates that the filename interval matches the 'interval' setting below.
database: ./crypto_5m.db

# List of trading pair symbols to download
symbols:
  - BTCUSDT
  - MANAUSDT
  - COMPUSDT
  - DASHUSDT
  - 1INCHUSDT
  - SNXUSDT
  - MKRUSDT
  - INJUSDT
  - LDOUSDT
  - IOTAUSDT
  - ETHUSDT
  - SOLUSDT
  - ADAUSDT
  - XRPUSDT
  - DOTUSDT
  - LINKUSDT
  - LTCUSDT
  - BNBUSDT
  - UNIUSDT
  - TRXUSDT
  - ALGOUSDT
  - RUNEUSDT
  - ATOMUSDT
  - GRTUSDT
  - DOGEUSDT
  - AAVEUSDT
  - SUIUSDT
  - AVAXUSDT
  - NEARUSDT
  - HBARUSDT
  - QNTUSDT
  - EOSUSDT
  - IMXUSDT
  - SANDUSDT
  - XLMUSDT
  - XTZUSDT
  - THETAUSDT


# Data types to download
data_types:
  - spot
  - futures

# Kline interval (e.g., 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M)
# IMPORTANT: This interval must match the database filename pattern (crypto_{interval}.db)
# The system performs dual validation:
#   1. Filename check: Extracts interval from database name and compares with this setting
#   2. Metadata check: Stores interval in database and validates on subsequent runs
# Example: If database: ./crypto_5m.db, then interval MUST be 5m
interval: 5m

# Date range for data download (YYYY-MM-DD format)
# Also used for universe snapshots if top_n is specified
start_date: 2022-01-01
end_date: 2025-09-01

# Number of top coins to fetch for universe (optional)
# If specified, monthly snapshots will be fetched for each month from start_date to end_date
# If not specified (commented out), universe ingestion is skipped
# Example: With start_date: 2024-01-01 and end_date: 2024-12-31, this fetches 12 monthly snapshots
# top_n: 100