# Universe Filtering Configuration (Parquet Version)
#
# This configuration applies to CoinMarketCap universe data ingestion.
# The filtered universe is saved to a Parquet file for use with Binance data download.
#
# Note: CoinMarketCap uses "tags" terminology (similar to CoinGecko's "categories")

# Tags (categories) listed here will be EXCLUDED from universe ingestion.
# Coins matching ANY of these tags will be filtered out.

exclude_categories:
  # Stablecoins (excluded by default for quant analysis)
  - Stablecoins              # General stablecoin category (USDT, USDC, DAI, etc.)
  - USD Stablecoin           # USD-pegged stablecoins
  - Algorithmic Stablecoin   # Algorithmic stables (UST, FRAX, etc.)
  - Fiat-backed Stablecoin   # Fiat-backed variants
  - Yield-Bearing Stablecoin # sUSDe, sUSDS, etc.
  - Bridged Stablecoin       # Cross-chain bridged stablecoins (USDT0, BSC-USD)
  - Bridged USDT             # Bridged versions of USDT
  - Bridged-Tokens           # Generic bridged tokens

  # Wrapped tokens and tokenized assets
  - Wrapped-Tokens           # WBTC, WETH, WBNB, etc.
  - Tokenized BTC            # Bitcoin-wrapped tokens
  - Tokenized Gold           # Gold-backed tokens
  - Tokenized Stocks         # Stock-backed tokens
  - Liquid Staking Tokens    # STETH, rETH, etc.
  - Liquid Staked ETH        # Lido stETH and similar
  - Crypto-Backed Tokens     # Generic wrapped/backed tokens

  # Privacy coins (excluded for regulatory/compliance reasons)
  - Privacy                  # XMR, ZEC, DASH, BEAM, etc.
  - Privacy Blockchain       # Privacy-focused L1s (SCRT, etc.)

  # Real World Assets (excluded - not native crypto)
  - Real World Assets (RWA)  # Tokenized mortgages, stocks, bonds, commodities
  - RWA Protocol             # RWA infrastructure tokens

# Optional: Uncomment to exclude meme/themed tokens
# - AI Meme                  # AI-themed meme coins
# - Meme                     # General meme coins
# - Anime-Themed             # Anime-themed tokens
# - 4chan-Themed             # 4chan-themed tokens

# Optional: Uncomment to exclude gaming/NFT tokens
# - Gaming                   # Gaming tokens
# - NFT                      # NFT-related tokens
# - Fan Token                # Sports fan tokens

# Future tags can be added here
# CoinMarketCap tags are similar to CoinGecko categories
# Common tags: mineable, pow, defi, dex, nft, gaming, metaverse, etc.
